name: Auto-Update Fitch PCDR

# Runs on the 5th and 20th of every month (Fitch publishes ~monthly, mid-month).
# Also runs on every push to main so the JSON is always in sync.
on:
  schedule:
    - cron: '0 14 5 * *'   # 5th of month, 14:00 UTC (9am ET)
    - cron: '0 14 20 * *'  # 20th of month, 14:00 UTC
  workflow_dispatch:        # allow manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  update-pcdr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch latest Fitch PCDR
        id: fetch
        run: |
          python scripts/fetch_fitch_pcdr.py
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Commit and push if updated
        if: steps.fetch.outcome == 'success'
        run: |
          git config user.name  "pcdr-bot"
          git config user.email "actions@github.com"
          git add data/market-data.json
          git diff --staged --quiet || git commit -m "Auto-update: Fitch PCDR $(date +'%Y-%m-%d')"
          git push

      - name: No update needed
        if: steps.fetch.outcome != 'success'
        run: echo "PCDR unchanged or fetch error — no commit needed."
